```
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        position:relative;

        background:
        radial-gradient(circle at top left,#e50914 0%,transparent 30%),
        radial-gradient(circle at bottom right,#b20710 0%,transparent 30%),
        #141414;
    }

    /* Animated background particles */

    .glow{
        position:absolute;
        border-radius:50%;
        filter:blur(120px);
        opacity:.25;
        animation:float 8s ease-in-out infinite;
    }

    .glow1{
        width:350px;
        height:350px;
        background:#e50914;
        top:-100px;
        left:-100px;
    }

    .glow2{
        width:300px;
        height:300px;
        background:#b20710;
        bottom:-80px;
        right:-80px;
        animation-delay:2s;
    }

    @keyframes float{
        0%,100%{
            transform:translateY(0px);
        }
        50%{
            transform:translateY(-30px);
        }
    }

    /* Main Card */

    .card{
        width:90%;
        max-width:650px;

        text-align:center;

        padding:50px 40px;

        background:rgba(255,255,255,0.05);

        border:1px solid rgba(255,255,255,0.08);

        backdrop-filter:blur(18px);

        border-radius:24px;

        color:#fff;

        box-shadow:
        0 25px 60px rgba(0,0,0,.6);

        animation:fadeUp 1s ease;
    }

    @keyframes fadeUp{
        from{
            opacity:0;
            transform:translateY(60px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
    }

    /* Success Icon */

    .success-circle{
        width:120px;
        height:120px;

        margin:0 auto 30px;

        border-radius:50%;

        background:linear-gradient(
            135deg,
            #e50914,
            #ff3341
        );

        display:flex;
        justify-content:center;
        align-items:center;

        font-size:60px;
        font-weight:bold;

        color:white;

        box-shadow:
        0 0 40px rgba(229,9,20,.5);

        animation:pop .8s ease;
    }

    @keyframes pop{
        0%{
            transform:scale(0);
            opacity:0;
        }
        100%{
            transform:scale(1);
            opacity:1;
        }
    }

    h1{
        font-size:3rem;
        margin-bottom:15px;
        font-weight:700;
    }

    p{
        color:#cfcfcf;
        line-height:1.9;
        font-size:1.05rem;
        margin-bottom:35px;
    }

    .btn{
        display:inline-block;

        text-decoration:none;

        background:#e50914;
        color:white;

        padding:15px 35px;

        border-radius:50px;

        font-weight:600;

        transition:.3s ease;
    }

    .btn:hover{
        transform:translateY(-4px);
        background:#ff1f2f;

        box-shadow:
        0 12px 30px rgba(229,9,20,.4);
    }

    /* Branding */

    .brand{
        position:absolute;
        top:25px;
        left:40px;

        color:#e50914;

        font-size:2rem;
        font-weight:700;

        letter-spacing:3px;
    }

    /* Responsive */

    @media(max-width:768px){

        .card{
            padding:40px 25px;
        }

        h1{
            font-size:2rem;
        }

        p{
            font-size:0.95rem;
        }

        .success-circle{
            width:100px;
            height:100px;
            font-size:48px;
        }

        .brand{
            font-size:1.5rem;
            left:20px;
            top:20px;
        }
    }
</style>
```

</head>

<body>

```
<div class="brand">PAWAN</div>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="card">

    <div class="success-circle">✓</div>

    <h1>Message Sent!</h1>

    <p>
        Thank you for contacting me. Your message has been received
        successfully. I appreciate your interest and will get back to
        you as soon as possible.
    </p>

    <a href="index.html#contact" class="btn">
        Back to Portfolio
    </a>

</div>
```
